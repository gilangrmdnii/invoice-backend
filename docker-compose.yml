version: "3"

services:
  invoice-backend-prod:
    build: .
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.invoice-backend-prod-http.entrypoints=web"
      - "traefik.http.routers.invoice-backend-prod-http.rule=Host(`apiinvoice.appstage.my.id`)"
      - "traefik.http.routers.invoice-backend-prod-http.middlewares=redirect-to-https"
      - "traefik.http.routers.invoice-backend-prod.entrypoints=websecure"
      - "traefik.http.routers.invoice-backend-prod.tls.certresolver=myresolver"
      - "traefik.http.routers.invoice-backend-prod.rule=Host(`apiinvoice.appstage.my.id`)"
      - "traefik.http.routers.invoice-backend-prod.tls=true"
    restart: always
    networks:
      - traefik_default
    volumes:
      - /root/workspace/testing-app/invoice-upload/uploads:/app/uploads
    env_file:
      - .env
networks:
  traefik_default:
    external: true
